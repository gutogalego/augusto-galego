name: Notify Manus on New Issues

on:
  issues:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read

    steps:
      - name: Send issue notification email via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          MANUS_EMAIL: ${{ secrets.MANUS_EMAIL }}
          EVENT_PAYLOAD: ${{ toJson(github.event) }}
        run: |
          python - <<'PY'
          import json
          import os
          import ssl
          import urllib.request

          event = json.loads(os.environ['EVENT_PAYLOAD'])
          issue = event.get('issue', {})

          repo = os.environ.get('GITHUB_REPOSITORY', '').strip()
          number = str(issue.get('number', '')).strip()
          title = (issue.get('title') or '').strip()
          body = (issue.get('body') or '').strip()
          author = (issue.get('user', {}).get('login') or '').strip()
          url = (issue.get('html_url') or '').strip()
          target_repo = 'gutogalego/augusto-galego'
          target_repo_url = f'https://github.com/{target_repo}'

          api_key = os.environ.get('RESEND_API_KEY', '').strip()
          from_email = os.environ.get('RESEND_FROM', '').strip()
          to_email = os.environ.get('MANUS_EMAIL', '').strip()

          if not api_key:
              raise SystemExit('Missing required RESEND_API_KEY secret.')

          if not from_email:
              raise SystemExit('Missing required RESEND_FROM secret.')

          if not to_email:
              raise SystemExit('Missing required MANUS_EMAIL secret.')

          subject = f"New GitHub Issue: #{number} - {title}".strip()
          text = (
              f"Repository: {target_repo}\n"
              f"Issue: #{number}\n"
              f"Title: {title}\n"
              f"Author: {author}\n"
              f"URL: {url}\n"
              f"Repository URL: {target_repo_url}\n"
              f"Source repository in GitHub event: {repo}\n\n"
              "Repository access context:\n"
              f"- Source repository: {target_repo_url}\n"
              "- Manus has access to this repository.\n"
              "- Please solve this issue directly in the repository and respond with the fix details.\n\n"
              "---\n"
              f"{body}"
          ).strip()

          payload = {
              'from': from_email,
              'to': [to_email],
              'subject': subject,
              'text': text,
          }

          request = urllib.request.Request(
              'https://api.resend.com/emails',
              data=json.dumps(payload).encode('utf-8'),
              headers={
                  'Authorization': f'Bearer {api_key}',
                  'Content-Type': 'application/json',
              },
              method='POST',
          )

          with urllib.request.urlopen(request, context=ssl.create_default_context(), timeout=30) as response:
              response.read()
          PY