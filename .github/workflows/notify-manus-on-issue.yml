name: Notify Manus on New Issues

on:
  issues:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read

    steps:
      - name: Send issue notification email via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          MANUS_EMAIL: ${{ secrets.MANUS_EMAIL }}
          EVENT_PAYLOAD: ${{ toJson(github.event) }}
        run: |
          python - <<'PY'
          import json
          import os
          import ssl
          import urllib.error
          import urllib.request

          event = json.loads(os.environ['EVENT_PAYLOAD'])
          issue = event.get('issue', {})

          number = str(issue.get('number', '')).strip()
          title = (issue.get('title') or '').strip()
          body = (issue.get('body') or '').strip()
          author = (issue.get('user', {}).get('login') or '').strip()
          url = (issue.get('html_url') or '').strip()
          target_repo = 'gutogalego/augusto-galego'
          target_repo_url = f'https://github.com/{target_repo}'

          api_key = os.environ.get('RESEND_API_KEY', '').strip()
          resend_from = os.environ.get('RESEND_FROM', '').strip()
          smtp_from = os.environ.get('SMTP_FROM', '').strip()
          to_email = os.environ.get('MANUS_EMAIL', '').strip()

          sender_candidates = []
          if resend_from:
              sender_candidates.append((resend_from, 'RESEND_FROM'))
          if smtp_from:
              sender_candidates.append((smtp_from, 'SMTP_FROM'))

          if not api_key:
              raise SystemExit('Missing required RESEND_API_KEY secret.')

          if not sender_candidates:
              raise SystemExit('Missing sender email. Set RESEND_FROM (preferred) or SMTP_FROM.')

          if not to_email:
              raise SystemExit('Missing required MANUS_EMAIL secret.')

          subject = f"New GitHub Issue: #{number} - {title}".strip()
          text = (
              f"Repository: {target_repo}\n"
              f"Issue: #{number}\n"
              f"Title: {title}\n"
              f"Author: {author}\n"
              f"URL: {url}\n"
              f"Repository URL: {target_repo_url}\n"
              f"Source repository in GitHub event: {os.environ.get('GITHUB_REPOSITORY', '').strip()}\n\n"
              "Repository access context:\n"
              f"- Source repository: {target_repo_url}\n"
              "- Manus has access to this repository.\n"
              "- Please solve this issue directly in the repository. "
              "Create a new branch, commit your changes, push that branch, and create a pull request linked to this issue.\n"
              "- Include a concise summary of what you changed and why in the PR description.\n\n"
              "---\n"
              f"{body}"
          ).strip()

          def send_with(sender_email):
              payload = {
                  'from': sender_email,
                  'to': to_email,
                  'subject': subject,
                  'text': text,
                  'html': f"<pre>{text}</pre>",
              }
              request = urllib.request.Request(
                  'https://api.resend.com/emails',
                  data=json.dumps(payload).encode('utf-8'),
                  headers={
                      'Authorization': f'Bearer {api_key}',
                      'Content-Type': 'application/json',
                      'User-Agent': 'curl/8.5.0',
                      'Accept': 'application/json',
                  },
                  method='POST',
              )
              with urllib.request.urlopen(request, context=ssl.create_default_context(), timeout=30) as response:
                  response.read()

          last_error = None
          for sender_email, sender_source in sender_candidates:
              try:
                  send_with(sender_email)
                  print(f'Sent via {sender_source}: {sender_email}')
                  last_error = None
                  break
              except urllib.error.HTTPError as e:
                  error_body = e.read().decode('utf-8', errors='replace')
                  last_error = (
                      f'Attempt with {sender_source}={sender_email} failed with HTTP {e.code} {e.reason}. '
                      f'Response body: {error_body}'
                  )
                  continue
              except urllib.error.URLError as e:
                  raise SystemExit(f'Resend API network error: {e.reason}')

          if last_error:
              raise SystemExit(
                  f'{last_error}. This usually means the sender address is not verified in Resend. '
                  'Set RESEND_FROM to a verified sender (for example me@augustogalego.com).'
              )
          PY
